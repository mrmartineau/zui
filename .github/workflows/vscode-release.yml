name: VS Code Extension Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      skip_package_age:
        description: 'Bypass Aikido safe-chain minimum package age check'
        type: boolean
        default: false

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish:
    name: Build and publish to VS Code Marketplace
    runs-on: ubuntu-latest
    # Skip when this workflow's own semantic-release created the triggering GitHub release
    # (its tag starts with `vscode-zui-`), otherwise it would re-trigger itself in a loop.
    if: github.event_name == 'workflow_dispatch' || !startsWith(github.event.release.tag_name, 'vscode-zui-')
    permissions:
      contents: write
      issues: write
      pull-requests: write
    defaults:
      run:
        working-directory: packages/vscode-zui

    steps:
      - uses: actions/checkout@v6
        with:
          # Release events check out the tag ref by default, but semantic-release
          # only publishes from a configured branch — check out main explicitly.
          ref: main
          fetch-depth: 0          # semantic-release needs full history + tags
          token: ${{ secrets.GITHUB_TOKEN }}

      # No `version` input: it would conflict with the root packageManager field,
      # which pnpm/action-setup reads on its own.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install safe-chain
        run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/latest/download/install-safe-chain.sh | sh -s -- --ci

      # inputs.skip_package_age is only set on manual dispatch; on release events it's empty so the flag is omitted.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile ${{ inputs.skip_package_age && '--safe-chain-skip-minimum-package-age' || '' }}
        working-directory: .

      # Build the extension artifacts (manifest + bundle) up front. semantic-release then
      # bumps package.json, writes CHANGELOG.md, and runs `vsce package` + `vsce publish`
      # against the freshly-bumped version (see release.config.mjs).
      - name: Build extension
        run: pnpm run build

      - name: Release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
