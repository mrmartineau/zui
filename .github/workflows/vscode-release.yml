name: VS Code Extension Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      skip_package_age:
        description: 'Bypass Aikido safe-chain minimum package age check'
        type: boolean
        default: false

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish:
    name: Build and publish to VS Code Marketplace
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: packages/vscode-zui

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v6
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 'latest'
          cache: 'pnpm'

      - name: Install safe-chain
        run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/latest/download/install-safe-chain.sh | sh -s -- --ci

      # inputs.skip_package_age is only set on manual dispatch; on release events it's empty so the flag is omitted.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile ${{ inputs.skip_package_age && '--safe-chain-skip-minimum-package-age' || '' }}
        working-directory: .

      - name: Bump extension patch version
        run: npm version patch --no-git-tag-version

      - name: Update lockfile for new version
        run: pnpm install --lockfile-only --no-frozen-lockfile
        working-directory: .

      - name: Generate manifest
        run: pnpm run build:manifest

      - name: Build extension
        run: pnpm run build:ext

      - name: Package .vsix
        run: pnpm run package

      - name: Publish to VS Code Marketplace
        run: pnpm run publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Commit version bump
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add packages/vscode-zui/package.json pnpm-lock.yaml
          git commit -m "chore(vscode-zui): bump extension version [skip ci]"
          git push
        working-directory: .
