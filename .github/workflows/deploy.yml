name: Deploy docs to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_package_age:
        description: 'Bypass Aikido safe-chain minimum package age check'
        type: boolean
        default: false

# Coalesce rapid pushes; a newer commit cancels an in-flight deploy of an older one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy docs to Cloudflare Workers
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 'latest'
          cache: 'pnpm'
      - name: Install safe-chain
        run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/latest/download/install-safe-chain.sh | sh -s -- --ci
      # inputs.skip_package_age is only set on manual dispatch; on push it's empty so the flag is omitted.
      - run: pnpm install --frozen-lockfile ${{ inputs.skip_package_age && '--safe-chain-skip-minimum-package-age' || '' }}
      # docs:build compiles @mrmartineau/zui first, then runs `astro build` (Cloudflare adapter)
      # into docs/dist, which wrangler.jsonc deploys as the Worker + static assets.
      - name: Build docs
        run: pnpm run docs:build
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # The Worker (wrangler.jsonc) lives in docs/, not the repo root.
          workingDirectory: docs
          packageManager: pnpm
          command: deploy
