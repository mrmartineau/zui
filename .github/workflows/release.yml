name: NPM Release

on:
  workflow_dispatch:

jobs:
  release:
    name: Release ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Serialise: each package's release commit + tag is pushed to main before the next
      # job checks out, avoiding non-fast-forward push races between the two releases.
      max-parallel: 1
      matrix:
        package: [zui, zui-theme]
    # Scope concurrency per package so re-runs of the same package queue, but the two
    # packages don't block each other across separate dispatches.
    concurrency: ${{ github.workflow }}-${{ matrix.package }}-${{ github.ref }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
      # No id-token: granting it makes pnpm attempt npm OIDC trusted publishing, which
      # 404s for packages without a configured trusted publisher and then fails to publish.
      # Without it, pnpm uses the NPM_TOKEN from .npmrc directly.
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0          # semantic-release needs full history
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 'latest'
          cache: 'pnpm'
      - name: Install safe-chain
        run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/latest/download/install-safe-chain.sh | sh -s -- --ci
      - run: pnpm install --frozen-lockfile
      - name: Configure npm auth
        # Placeholder is written literally; pnpm substitutes ${NPM_TOKEN} from the env at publish time.
        run: echo '//registry.npmjs.org/:_authToken=${NPM_TOKEN}' >> .npmrc
      - name: Build @mrmartineau/zui
        if: matrix.package == 'zui'
        run: pnpm --filter @mrmartineau/zui run build
      - name: Release
        working-directory: packages/${{ matrix.package }}
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
